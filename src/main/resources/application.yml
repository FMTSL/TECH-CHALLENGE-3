spring:
  application:
    name: booking-beleza
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Render (e outros PaaS no estilo Heroku) injeta a variavel de ambiente PORT com a porta
# que o container deve escutar (normalmente diferente de 8080) e faz o health check nessa
# porta. Sem isso, a aplicacao sempe sobe em 8080 e o health check do Render nunca encontra
# ninguem escutando na porta que ele espera, resultando em timeout mesmo com a aplicacao
# saudavel. Localmente (Docker Compose, execucao direta) a variavel PORT nao existe e o
# fallback :8080 mantem o comportamento de sempre.
server:
  port: ${PORT:8080}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:troque-este-segredo-em-producao-min-32-caracteres}
      expiracao-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

  spring:
    datasource:
      url: jdbc:postgresql://dpg-d9fd4hrh523c73evj7n0-a.oregon-postgres.render.com:5432/booking_beleza?sslmode=require
