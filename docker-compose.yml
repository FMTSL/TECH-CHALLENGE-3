services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booking_beleza
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5432:5432"
    volumes:
      - booking_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking_beleza"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"   # UI web para ver os e-mails enviados
      - "1025:1025"   # SMTP

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: troque-este-segredo-em-producao-min-32-caracteres
    ports:
      - "8080:8080"

volumes:
  booking_pgdata:
