# ===============================
# ConfigurańŃo de Perfis
# ===============================
spring.profiles.active=dev

# ===============================
# ConfigurańŃo do Banco de Dados (Desenvolvimento)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_agendamento
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# ConfigurańŃo JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# ConfigurańŃo de Logs
# ===============================
logging.level.org.springframework=INFO
logging.level.com.agendamento=DEBUG

# ===============================
# IntegrańŃo com Google Calendar
# ===============================
google.calendar.api.key=YOUR_API_KEY
google.calendar.client.id=YOUR_CLIENT_ID
google.calendar.client.secret=YOUR_CLIENT_SECRET
google.calendar.redirect.uri=http://localhost:8080/oauth2/callback