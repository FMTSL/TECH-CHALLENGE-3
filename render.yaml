# Deploy gratuito via Render (https://render.com) - opcao gratuita pedida no enunciado.
# Uso: conecte o repositorio no dashboard do Render e ele detecta este arquivo automaticamente
# (Blueprint), ou rode `render blueprint launch` com o Render CLI.
services:
  - type: web
    name: booking-beleza
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      # Plano free do Render = 512MB de RAM. Sem isso, a JVM usa ergonomia padrao
      # (heap baseado no total de memoria visivel), o que pode estourar o limite do
      # container, ser morta pelo OOM killer e reiniciar em loop ate o deploy expirar
      # ("Timed Out"). Heap + metaspace + stack de thread reduzidos deixam mais folga
      # para o restante do processo (pool de conexoes, Tomcat, overhead nativo da JVM).
      - key: JAVA_OPTS
        value: "-Xms128m -Xmx400m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
      # O Render fornece uma connectionString pronta no formato postgres://usuario:senha@host:porta/banco,
      # que NAO e compativel com o formato jdbc:postgresql://... exigido pelo Spring Boot.
      # Por isso montamos a URL JDBC a partir das propriedades separadas (ver application-render.yml).
      - key: DB_HOST
        fromDatabase:
          name: booking-beleza-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: booking-beleza-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: booking-beleza-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: booking-beleza-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: booking-beleza-db
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: booking-beleza-db
    plan: free
    databaseName: booking_beleza
    user: booking
