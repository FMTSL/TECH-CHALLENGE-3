spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      initialization-fail-timeout: 0 # Não trava a subida do Spring Boot se a 1ª conexão demorar
      connection-timeout: 20000     # Limite de 20s para conectar
      maximum-pool-size: 3          # Economiza memória RAM no plano grátis (512MB)
      minimum-idle: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate            # Evita operações pesadas de schema no startup
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

# Expõe e libera a rota do Actuator para o Health Check da Render
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always